project_id = "tinkrakademiet-lms"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3001"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# NOTE: region is NOT set here — it is chosen once, irrevocably, at project
# creation time (`supabase projects create --region eu-central-1`) or in the
# dashboard. See SETUP.md §1. This config.toml only governs local dev.
